# HTTP server
server.port=8082

# PostgreSQL
db.host=postgres
db.port=5432
db.database=dropvox
db.scheme=metadata
db.user=user
db.password=pass
db.pool.maxSize=5

# MinIO / S3
s3.endpoint=http://minio:9000
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.bucket=dropvox-files
s3.region=us-east-1

# Presigned URL expiration
presigned.url.expiry.minutes=5
