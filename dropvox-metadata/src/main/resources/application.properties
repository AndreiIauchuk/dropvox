# HTTP server
server.port=8082
# PostgreSQL
db.host=postgres-service
db.port=5432
db.database=dropvox
db.user=user
db.password=pass
db.pool.maxSize=20
# MinIO / S3
s3.endpoint=http://minio:9000
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.bucket=dropvox-files
s3.region=us-east-1
# Presigned URL expiration (minutes)
presigned.url.expiry.minutes=5
