# HTTP server
server.port=9082

# PostgreSQL
db.host=localhost
db.port=5432
db.database=dropvox
db.scheme=metadata
db.user=user
db.password=pass
db.pool.maxSize=5

# MinIO / S3
s3.endpoint=http://localhost:9000
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.bucket=dropvox-files

# Presigned URL expiration
presigned.url.expiry.minutes=5
