services:
  postgres:
    image: postgres:15
    container_name: dropvox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dropvox}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dropvox-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: dropvox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - dropvox-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dropvox-gateway:
    build:
      context: .
      dockerfile: ./dropvox-gateway/Dockerfile
    container_name: dropvox-gateway
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_HOST: dropvox-auth
      AUTH_SERVICE_PORT: 8081
      METADATA_SERVICE_HOST: dropvox-metadata
      METADATA_SERVICE_PORT: 8082
    ports:
      - "8080:8080"
    depends_on:
      - dropvox-auth
      - dropvox-metadata
    networks:
      - dropvox-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dropvox-auth:
    build:
      context: .
      dockerfile: ./dropvox-auth/Dockerfile
    container_name: dropvox-auth
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dropvox-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dropvox-metadata:
    build:
      context: .
      dockerfile: ./dropvox-metadata/Dockerfile
    container_name: dropvox-metadata
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-dropvox}
      DB_SCHEME: ${DB_SCHEME:-metadata}
      DB_USER: ${POSTGRES_USER:-user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      DB_POOL_MAX_SIZE: 5
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-dropvox-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      PRESIGNED_URL_EXPIRY_MINUTES: ${S3_PRESIGNED_URL_EXPIRY_MINUTES:-5}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dropvox-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: dropvox-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - dropvox-net

  loki:
    image: grafana/loki:3.7.0
    container_name: dropvox-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - lokidata:/loki
    networks:
      - dropvox-net

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: dropvox-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloydata:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - dropvox-net

  grafana:
    image: grafana/grafana:13.0.1
    container_name: dropvox-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards/dropvox:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - dropvox-net

volumes:
  pgdata:
  miniodata:
  promdata:
  lokidata:
  alloydata:
  grafanadata:

networks:
  dropvox-net:
    driver: bridge
